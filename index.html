<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaina Parveen - Age Counter</title>
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1a1c29, #0e1017);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Abstract Premium Glowing Background Elements */
        .bg-glow-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border-radius: 50%;
            filter: blur(120px);
            top: 10%;
            left: 15%;
            z-index: 1;
            opacity: 0.3;
        }

        .bg-glow-2 {
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            border-radius: 50%;
            filter: blur(130px);
            bottom: 10%;
            right: 15%;
            z-index: 1;
            opacity: 0.3;
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Language Toggle Button Style */
        .lang-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00f2fe;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .lang-toggle-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            transform: scale(1.05);
        }

        /* Header Styles */
        .header-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00f2fe;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .baby-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #ff007f, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .birth-info {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px rgba(255, 255, 255, 0.05) solid;
        }

        /* Dashboard Grid Layout */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .counter-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .counter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
        }

        .card-yy::before { background: #ff007f; }
        .card-mm::before { background: #7928ca; }
        .card-dd::before { background: #00f2fe; }

        .counter-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .counter-value {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
        }

        .card-yy .counter-value { color: #ff007f; text-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
        .card-mm .counter-value { color: #b829fa; text-shadow: 0 0 15px rgba(184, 41, 250, 0.3); }
        .card-dd .counter-value { color: #00f2fe; text-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }

        .counter-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        /* Total Days / Live Ticker Strip */
        .live-strip {
            background: linear-gradient(90deg, rgba(255, 0, 127, 0.1), rgba(0, 242, 254, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .total-days {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
        }

        .total-days span {
            color: #00f2fe;
            font-weight: 700;
        }

        /* Bottom Live Clock Style */
        .live-clock {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 8px #00ff66;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.4; }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .baby-name { font-size: 2rem; }
            .counter-value { font-size: 1.8rem; }
            .counter-grid { gap: 10px; }
            .lang-toggle-btn { top: 15px; right: 15px; padding: 4px 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <!-- Language Switcher Icon/Button -->
        <button class="lang-toggle-btn" onclick="toggleLanguage()">
            🌐 <span id="langBtnText">हिन्दी</span>
        </button>

        <div class="header-title" id="text-title">Growing Every Day</div>
        <div class="baby-name">Zaina Parveen</div>
        <div class="birth-info" id="text-born">Born: 24 May 2026</div>

        <!-- Format: YY MM DD Dashboard -->
        <div class="counter-grid">
            <div class="counter-card card-yy">
                <div class="counter-value" id="years">0</div>
                <div class="counter-label" id="text-years">Years</div>
            </div>
            <div class="counter-card card-mm">
                <div class="counter-value" id="months">0</div>
                <div class="counter-label" id="text-months">Months</div>
            </div>
            <div class="counter-card card-dd">
                <div class="counter-value" id="days">0</div>
                <div class="counter-label" id="text-days">Days</div>
            </div>
        </div>

        <!-- Total Days Tracker Strip -->
        <div class="live-strip">
            <div class="total-days" id="totalDaysBox">
                <span id="text-total-prefix">Total:</span> <span id="totalDaysCount">0</span> <span id="text-total-suffix">Days Old</span>
            </div>
        </div>

        <!-- Live Status Ticker -->
        <div class="live-clock">
            <div class="live-dot"></div>
            <div id="liveTimeText">Calculating live age...</div>
        </div>
    </div>

    <script>
        // Target Baby Birth Date & Time (24 May 2026 at 00:00:00)
        const birthDate = new Date("2026-05-24T00:00:00");
        
        // Language State Management
        let currentLang = 'en'; // Default is English

        const translations = {
            en: {
                btn: "हिन्दी",
                title: "Growing Every Day",
                born: "Born: 24 May 2026",
                years: "Years",
                months: "Months",
                days: "Days",
                totalPrefix: "Total:",
                totalSuffix: "Days Old",
                livePrefix: "Live Counting Tracker:"
            },
            hi: {
                btn: "English",
                title: "हर दिन बढ़ रही है",
                born: "जन्म: 24 मई 2026",
                years: "वर्ष",
                months: "महीने",
                days: "दिन",
                totalPrefix: "कुल:",
                totalSuffix: "दिन की हुई",
                livePrefix: "लाइव काउंटिंग ट्रैकर:"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            updateStaticText();
            updateAgeCounter(); // Immediately refresh the time text display language
        }

        function updateStaticText() {
            const langData = translations[currentLang];
            document.getElementById("langBtnText").innerText = langData.btn;
            document.getElementById("text-title").innerText = langData.title;
            document.getElementById("text-born").innerText = langData.born;
            document.getElementById("text-years").innerText = langData.years;
            document.getElementById("text-months").innerText = langData.months;
            document.getElementById("text-days").innerText = langData.days;
            document.getElementById("text-total-prefix").innerText = langData.totalPrefix;
            document.getElementById("text-total-suffix").innerText = langData.totalSuffix;
        }

        function updateAgeCounter() {
            const now = new Date();
            const langData = translations[currentLang];
            
            if (now < birthDate) {
                document.getElementById("years").innerText = "0";
                document.getElementById("months").innerText = "0";
                document.getElementById("days").innerText = "0";
                document.getElementById("totalDaysCount").innerText = "0";
                document.getElementById("liveTimeText").innerText = currentLang === 'en' ? "Waiting for birth date..." : "जन्म तिथि का इंतजार है...";
                return;
            }

            // 1. Calculate Total Days Directly
            const totalTimeDifference = now - birthDate;
            const totalDaysCalculated = Math.floor(totalTimeDifference / (1000 * 60 * 60 * 24));
            document.getElementById("totalDaysCount").innerText = totalDaysCalculated;

            // 2. Precise Calendar YY MM DD Breakdown Calculation
            let currentYear = now.getFullYear();
            let currentMonth = now.getMonth();
            let currentDay = now.getDate();

            let birthYear = birthDate.getFullYear();
            let birthMonth = birthDate.getMonth();
            let birthDay = birthDate.getDate();

            let calculatedYears = currentYear - birthYear;
            let calculatedMonths = currentMonth - birthMonth;
            let calculatedDays = currentDay - birthDay;

            // Adjust days if negative
            if (calculatedDays < 0) {
                const previousMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                calculatedDays += previousMonth;
                calculatedMonths--;
            }

            // Adjust months if negative
            if (calculatedMonths < 0) {
                calculatedMonths += 12;
                calculatedYears--;
            }

            // DOM Update UI Elements (No padding zeros, clean single/multiple raw integers)
            document.getElementById("years").innerText = calculatedYears;
            document.getElementById("months").innerText = calculatedMonths;
            document.getElementById("days").innerText = calculatedDays;

            // 3. 12-Hour format with AM/PM & Milliseconds (No leading zero on hours)
            let rawHours = now.getHours();
            const ampm = rawHours >= 12 ? 'PM' : 'AM';
            
            let displayHours = rawHours % 12;
            displayHours = displayHours ? displayHours : 12; // Convert '0' to '12'

            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Get Milliseconds and convert to 2-digit format (0-99 scale)
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            
            // Milliseconds format tracking display: H:MM:SS:MS AM/PM
            document.getElementById("liveTimeText").innerText = `${langData.livePrefix} ${displayHours}:${minutes}:${seconds}:${ms} ${ampm}`;
        }

        // Initialize App UI Text and high-frequency interval loop (40ms refresh for smooth millisecond transition)
        updateStaticText();
        updateAgeCounter();
        setInterval(updateAgeCounter, 40);
    </script>
</body>
</html>
