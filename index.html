<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaina Parveen - Age Counter</title>
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1a1c29, #0e1017);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Abstract Premium Glowing Background Elements */
        .bg-glow-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border-radius: 50%;
            filter: blur(120px);
            top: 10%;
            left: 15%;
            z-index: 1;
            opacity: 0.3;
        }

        .bg-glow-2 {
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            border-radius: 50%;
            filter: blur(130px);
            bottom: 10%;
            right: 15%;
            z-index: 1;
            opacity: 0.3;
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Language Toggle Button Style */
        .lang-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00f2fe;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .lang-toggle-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            transform: scale(1.05);
        }

        /* Photo Upload Circle */
        .photo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            perspective: 900px;
            position: relative;
        }

        .photo-shadow {
            position: absolute;
            top: 130px;
            width: 110px;
            height: 20px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.1) 70%, transparent 100%);
            border-radius: 50%;
            opacity: 0;
            transform: scaleX(1) scaleY(1);
        }

        .photo-shadow.dropping {
            animation: shadowDrop 2.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes shadowDrop {
            0% { opacity: 0; transform: scaleX(0.3) scaleY(0.1); }
            30% { opacity: 0.5; transform: scaleX(1) scaleY(1); }
            50% { opacity: 0.6; transform: scaleX(1.1) scaleY(0.9); }
            65% { opacity: 0.55; transform: scaleX(1.05) scaleY(0.95); }
            80% { opacity: 0.4; transform: scaleX(1.02) scaleY(0.98); }
            100% { opacity: 0.3; transform: scaleX(1) scaleY(1); }
        }

        .photo-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(0, 242, 254, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
        }

        .photo-circle.glow-mode {
            animation: photoGlow 3s ease-in-out infinite;
        }

        .photo-circle.has-photo {
            animation: coinDrop 2.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, photoGlow 3s ease-in-out infinite;
            animation-delay: 0s, 2.8s;
        }

        .photo-circle.has-photo.flipping {
            animation: coinFlip 4.5s ease-in-out 1, photoGlow 3s ease-in-out infinite;
            animation-delay: 0s, 0s;
        }

        .photo-circle.glow-mode.flipping {
            animation: coinFlip 4.5s ease-in-out 1, photoGlow 3s ease-in-out infinite;
            animation-delay: 0s, 0s;
        }

        @keyframes coinDrop {
            0% { 
                transform: translateY(-250px) scale(0.75);
                opacity: 0;
            }
            15% {
                transform: translateY(-200px) scale(0.8);
                opacity: 0.5;
            }
            30% {
                transform: translateY(0px) scale(1.08);
                opacity: 1;
            }
            40% {
                transform: translateY(-60px) scale(1.04);
            }
            50% {
                transform: translateY(0px) scale(1.06);
            }
            58% {
                transform: translateY(-35px) scale(1.03);
            }
            65% {
                transform: translateY(0px) scale(1.03);
            }
            72% {
                transform: translateY(-18px) scale(1.01);
            }
            80% {
                transform: translateY(0px) scale(1.01);
            }
            88% {
                transform: translateY(-8px) scale(1.005);
            }
            96% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(0px) scale(1);
                opacity: 1;
            }
        }

        @keyframes coinFlip {
            0% { transform: rotateY(0deg) scale(1); }
            25% { transform: rotateY(90deg) scale(1.04); }
            50% { transform: rotateY(180deg) scale(1.06); }
            75% { transform: rotateY(270deg) scale(1.04); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        @keyframes photoGlow {
            0%, 100% {
                box-shadow: 
                    0 0 20px rgba(0, 242, 254, 0.5),
                    0 0 40px rgba(0, 242, 254, 0.35),
                    0 0 60px rgba(0, 242, 254, 0.25),
                    0 0 80px rgba(255, 0, 127, 0.3),
                    inset 0 0 25px rgba(0, 242, 254, 0.15);
                border-color: rgba(0, 242, 254, 0.7);
            }
            50% {
                box-shadow: 
                    0 0 30px rgba(0, 242, 254, 0.8),
                    0 0 60px rgba(0, 242, 254, 0.6),
                    0 0 90px rgba(0, 242, 254, 0.4),
                    0 0 120px rgba(255, 0, 127, 0.5),
                    inset 0 0 35px rgba(0, 242, 254, 0.25);
                border-color: rgba(0, 242, 254, 1);
            }
        }

        .photo-circle:hover {
            transform: scale(1.04);
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-icon {
            font-size: 2rem;
            opacity: 0.6;
        }

        .photo-hint {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .photo-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 30px;
            height: 30px;
            background: #00f2fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .photo-menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .photo-menu-overlay.active {
            display: flex;
        }

        .photo-menu-box {
            background: #1a1c29;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 20px;
            width: 240px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .photo-menu-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s ease;
        }

        .photo-menu-btn:last-child { margin-bottom: 0; }

        .photo-menu-btn:hover {
            background: rgba(0, 242, 254, 0.15);
        }

        .photo-menu-btn.danger {
            color: #ff5c7c;
            border-color: rgba(255, 92, 124, 0.25);
        }

        .photo-menu-btn.danger:hover {
            background: rgba(255, 92, 124, 0.15);
        }

        .photo-menu-cancel {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 14px;
            cursor: pointer;
        }

        /* Header Styles */
        .header-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00f2fe;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .baby-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #ff007f, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .birth-info {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px rgba(255, 255, 255, 0.05) solid;
        }

        /* Dashboard Grid Layout */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .counter-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .counter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
        }

        .card-yy::before { background: #ff007f; }
        .card-mm::before { background: #7928ca; }
        .card-dd::before { background: #00f2fe; }

        .counter-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .counter-value {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
        }

        .card-yy .counter-value { color: #ff007f; text-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
        .card-mm .counter-value { color: #b829fa; text-shadow: 0 0 15px rgba(184, 41, 250, 0.3); }
        .card-dd .counter-value { color: #00f2fe; text-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }

        .counter-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        /* Total Days / Live Ticker Strip */
        .live-strip {
            background: linear-gradient(90deg, rgba(255, 0, 127, 0.1), rgba(0, 242, 254, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .speaker-btn {
            background: rgba(0, 242, 254, 0.15);
            border: 1.5px solid rgba(0, 242, 254, 0.4);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .speaker-btn:hover {
            background: rgba(0, 242, 254, 0.25);
            border-color: rgba(0, 242, 254, 0.7);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            transform: scale(1.05);
        }

        .speaker-btn:active {
            transform: scale(0.95);
        }

        .total-days {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
        }

        .total-days span {
            color: #00f2fe;
            font-weight: 700;
        }

        /* Bottom Live Clock Style */
        .live-clock {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 8px #00ff66;
            flex-shrink: 0;
            margin-right: 8px;
        }

        /* Absolute shake-proof structure using precise grid blocks */
        .time-display-container {
            display: inline-flex;
            align-items: center;
            font-variant-numeric: tabular-nums;
            -moz-font-feature-settings: "tnum";
            -webkit-font-feature-settings: "tnum";
            font-feature-settings: "tnum";
            margin-left: 6px;
            perspective: 200px;
        }

        /* Standard digits segment container */
        .time-block {
            display: inline-block;
            text-align: center;
            width: 20px; /* Locked width for 2-digit numbers */
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .time-block.hr-block {
            width: 16px; /* Optimized single/double digit block for hour */
            text-align: right;
        }

        .time-colon {
            display: inline-block;
            text-align: center;
            width: 3px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Separate and lock AM/PM to the far right without shaking */
        .ampm-block {
            display: inline-block;
            width: 32px;
            text-align: left;
            margin-left: 6px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .time-block.digit-flip,
        .ampm-block.digit-flip {
            animation: digitFlip 0.32s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes digitFlip {
            0% { transform: rotateX(0deg); color: inherit; }
            48% { transform: rotateX(90deg); }
            50% { transform: rotateX(90deg); color: #00f2fe; }
            100% { transform: rotateX(0deg); }
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.4; }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .baby-name { font-size: 2rem; }
            .counter-value { font-size: 1.8rem; }
            .counter-grid { gap: 10px; }
            .lang-toggle-btn { top: 15px; right: 15px; padding: 4px 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <!-- Language Switcher Icon/Button -->
        <button class="lang-toggle-btn" onclick="toggleLanguage()">
            🌐 <span id="langBtnText">हिन्दी</span>
        </button>

        <!-- Baby Photo Upload -->
        <div class="photo-wrapper">
            <div class="photo-circle" id="photoCircle" onclick="openPhotoMenu()">
                <img id="photoImg" src="" alt="Baby Photo" style="display:none;">
                <span class="photo-icon" id="photoIcon">📷</span>
                <span class="photo-badge" id="photoBadge">📷</span>
            </div>
            <div class="photo-shadow" id="photoShadow"></div>
        </div>
        <div class="photo-hint" id="text-photo-hint">Tap to add photo</div>

        <!-- Camera or Gallery choice menu -->
        <div class="photo-menu-overlay" id="photoMenuOverlay" onclick="closePhotoMenuOnOverlay(event)">
            <div class="photo-menu-box">
                <button class="photo-menu-btn" id="btnUseCamera">📷 <span id="text-use-camera">Use Camera</span></button>
                <button class="photo-menu-btn" id="btnUseGallery">🖼️ <span id="text-use-gallery">Choose from Gallery</span></button>
                <button class="photo-menu-btn danger" id="btnRemovePhoto" style="display:none;">🗑️ <span id="text-remove-photo">Remove Photo</span></button>
                <div class="photo-menu-cancel" id="text-cancel" onclick="closePhotoMenu()">Cancel</div>
            </div>
        </div>

        <input type="file" id="photoInputCamera" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="photoInputGallery" accept="image/*" style="display:none;">

        <div class="header-title" id="text-title">Growing Every Day</div>
        <div class="baby-name">Zaina Parveen</div>
        <div class="birth-info" id="text-born">Born: 24 May 2026</div>

        <!-- Format: YY MM DD Dashboard -->
        <div class="counter-grid">
            <div class="counter-card card-yy">
                <div class="counter-value" id="years">0</div>
                <div class="counter-label" id="text-years">Years</div>
            </div>
            <div class="counter-card card-mm">
                <div class="counter-value" id="months">0</div>
                <div class="counter-label" id="text-months">Months</div>
            </div>
            <div class="counter-card card-dd">
                <div class="counter-value" id="days">0</div>
                <div class="counter-label" id="text-days">Days</div>
            </div>
        </div>

        <!-- Total Days Tracker Strip -->
        <div class="live-strip">
            <div class="total-days" id="totalDaysBox">
                <span id="text-total-prefix">Total:</span> <span id="totalDaysCount">0</span> <span id="text-total-suffix">Days Old</span>
            </div>
            <button class="speaker-btn" id="speakerBtn" onclick="speakAge()" title="Speak Age">🔊</button>
        </div>

        <!-- Live Status Ticker -->
        <div class="live-clock">
            <div class="live-dot"></div>
            <span id="liveLabel">Live Counting Tracker:</span>
            
            <!-- Completely Split Monospace Structure -->
            <div class="time-display-container">
                <span id="lblHour" class="time-block hr-block">0</span>
                <span class="time-colon">:</span>
                <span id="lblMin" class="time-block">00</span>
                <span class="time-colon">:</span>
                <span id="lblSec" class="time-block">00</span>
                <span class="time-colon">:</span>
                <span id="lblMs" class="time-block">00</span>
                <span id="lblAmpm" class="ampm-block">AM</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3bsKfP7CxS0Sb0CY6xu_vFogVcxbJCII",
            authDomain: "ashcostingapp.firebaseapp.com",
            databaseURL: "https://ashcostingapp-default-rtdb.firebaseio.com",
            projectId: "ashcostingapp",
            storageBucket: "ashcostingapp.firebasestorage.app",
            messagingSenderId: "576053214259",
            appId: "1:576053214259:web:e47a6c38721d62580fb746"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script>
        // Target Baby Birth Date & Time (24 May 2026 at 00:00:00)
        const birthDate = new Date("2026-05-24T00:00:00");
        
        // Language State Management
        let currentLang = 'en'; // Default is English
        let photoAlreadySet = false;
        let flipInterval = null;
        let dropAlreadyPlayed = false;

        const translations = {
            en: {
                btn: "हिन्दी",
                title: "Growing Every Day",
                born: "Born: 24 May 2026",
                years: "Years",
                months: "Months",
                days: "Days",
                totalPrefix: "Total:",
                totalSuffix: "Days Old",
                livePrefix: "Now Time:",
                photoHint: "Tap to add photo",
                useCamera: "Use Camera",
                useGallery: "Choose from Gallery",
                removePhoto: "Remove Photo",
                cancel: "Cancel"
            },
            hi: {
                btn: "English",
                title: "हर दिन बढ़ रही है",
                born: "जन्म: 24 मई 2026",
                years: "साल",
                months: "महीने",
                days: "दिन",
                totalPrefix: "कुल:",
                totalSuffix: "दिन की हुई",
                livePrefix: "अभी समय है:",
                photoHint: "फोटो जोड़ने के लिए टैप करें",
                useCamera: "कैमरा इस्तेमाल करें",
                useGallery: "गैलरी से चुनें",
                removePhoto: "फोटो हटाएं",
                cancel: "रद्द करें"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            updateStaticText();
            updateAgeCounter(); 
        }

        function updateStaticText() {
            const langData = translations[currentLang];
            document.getElementById("langBtnText").innerText = langData.btn;
            document.getElementById("text-title").innerText = langData.title;
            document.getElementById("text-born").innerText = langData.born;
            document.getElementById("text-years").innerText = langData.years;
            document.getElementById("text-months").innerText = langData.months;
            document.getElementById("text-days").innerText = langData.days;
            document.getElementById("text-total-prefix").innerText = langData.totalPrefix;
            document.getElementById("text-total-suffix").innerText = langData.totalSuffix;
            document.getElementById("liveLabel").innerText = langData.livePrefix;
            const photoHintEl = document.getElementById("text-photo-hint");
            if (photoHintEl && !photoAlreadySet) {
                photoHintEl.innerText = langData.photoHint;
            }
            document.getElementById("text-use-camera").innerText = langData.useCamera;
            document.getElementById("text-use-gallery").innerText = langData.useGallery;
            document.getElementById("text-remove-photo").innerText = langData.removePhoto;
            document.getElementById("text-cancel").innerText = langData.cancel;
        }

        // Baby Photo Upload Handling (Camera or Gallery) — synced via Firebase
        function openPhotoMenu() {
            document.getElementById("btnRemovePhoto").style.display = photoAlreadySet ? "flex" : "none";
            document.getElementById("photoMenuOverlay").classList.add("active");
        }

        function closePhotoMenu() {
            document.getElementById("photoMenuOverlay").classList.remove("active");
        }

        function closePhotoMenuOnOverlay(event) {
            if (event.target.id === "photoMenuOverlay") closePhotoMenu();
        }

        document.getElementById("btnUseCamera").addEventListener("click", function () {
            closePhotoMenu();
            document.getElementById("photoInputCamera").click();
        });

        document.getElementById("btnUseGallery").addEventListener("click", function () {
            closePhotoMenu();
            document.getElementById("photoInputGallery").click();
        });

        function triggerFlip() {
            const circle = document.getElementById("photoCircle");
            if (circle.classList.contains("glow-mode")) {
                circle.classList.remove("flipping");
                void circle.offsetWidth; // restart animation
                circle.classList.add("flipping");
                setTimeout(function() {
                    circle.classList.remove("flipping");
                }, 4500);
            }
        }

        function showPhotoPreview(dataUrl) {
            const circle = document.getElementById("photoCircle");
            const shadow = document.getElementById("photoShadow");

            // Photo shows immediately — no empty/default icon flash
            document.getElementById("photoImg").src = dataUrl;
            document.getElementById("photoImg").style.display = "block";
            document.getElementById("photoIcon").style.display = "none";
            document.getElementById("photoBadge").style.display = "none";
            document.getElementById("text-photo-hint").style.display = "none";

            // Play drop animation only ONCE (on first load)
            if (!dropAlreadyPlayed) {
                circle.classList.add("has-photo");
                shadow.classList.add("dropping");
                dropAlreadyPlayed = true;

                // After drop completes, switch to glow-only mode
                setTimeout(function() {
                    circle.classList.remove("has-photo");
                    circle.classList.add("glow-mode");
                    shadow.classList.remove("dropping");
                }, 2800);
            } else {
                // Photo already set before, just add glow
                circle.classList.add("glow-mode");
            }

            // Clear existing flip interval
            if (flipInterval) clearInterval(flipInterval);

            // Trigger flip every 8 seconds
            flipInterval = setInterval(triggerFlip, 8000);

            photoAlreadySet = true;
        }

        function resetPhotoUI() {
            const circle = document.getElementById("photoCircle");
            const shadow = document.getElementById("photoShadow");
            circle.classList.remove("has-photo");
            circle.classList.remove("glow-mode");
            circle.classList.remove("flipping");
            shadow.classList.remove("dropping");
            if (flipInterval) clearInterval(flipInterval);
            dropAlreadyPlayed = false;
            document.getElementById("photoImg").src = "";
            document.getElementById("photoImg").style.display = "none";
            document.getElementById("photoIcon").style.display = "block";
            document.getElementById("photoBadge").style.display = "flex";
            document.getElementById("text-photo-hint").style.display = "block";
            document.getElementById("text-photo-hint").innerText = translations[currentLang].photoHint;
            photoAlreadySet = false;
            lastSyncedPhoto = null;
        }

        function removePhoto() {
            closePhotoMenu();
            resetPhotoUI();
            localStorage.removeItem("zainaPhoto");
            firebase.database().ref("zainaPhoto/dataUrl").remove().catch(function (err) {
                console.error("Firebase photo remove failed:", err);
            });
        }

        document.getElementById("btnRemovePhoto").addEventListener("click", removePhoto);

        // Compress the image client-side (max 800px side, JPEG ~0.75 quality)
        // so it stays small enough to sync fast through Realtime Database.
        function compressImage(file, callback) {
            const img = new Image();
            const reader = new FileReader();
            reader.onload = function (e) {
                img.onload = function () {
                    const maxSize = 800;
                    let w = img.width;
                    let h = img.height;
                    if (w > h && w > maxSize) {
                        h = Math.round(h * (maxSize / w));
                        w = maxSize;
                    } else if (h > maxSize) {
                        w = Math.round(w * (maxSize / h));
                        h = maxSize;
                    }
                    const canvas = document.createElement("canvas");
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                    callback(canvas.toDataURL("image/jpeg", 0.75));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        let lastSyncedPhoto = null; // avoids re-rendering our own upload when the listener echoes it back

        function handlePhotoFile(file) {
            if (!file) return;

            compressImage(file, function (dataUrl) {
                lastSyncedPhoto = dataUrl;
                showPhotoPreview(dataUrl);
                try {
                    localStorage.setItem("zainaPhoto", dataUrl);
                } catch (err) {
                    console.error("Local photo save failed:", err);
                }
                // Push to Firebase so it shows on every device (e.g. friend's phone)
                firebase.database().ref("zainaPhoto/dataUrl").set(dataUrl).catch(function (err) {
                    console.error("Firebase photo sync failed:", err);
                });
            });
        }

        document.getElementById("photoInputCamera").addEventListener("change", function (event) {
            handlePhotoFile(event.target.files[0]);
        });

        document.getElementById("photoInputGallery").addEventListener("change", function (event) {
            handlePhotoFile(event.target.files[0]);
        });

        function loadSavedPhoto() {
            // Instant local preview so the screen isn't empty while Firebase loads
            const savedPhoto = localStorage.getItem("zainaPhoto");
            if (savedPhoto) {
                lastSyncedPhoto = savedPhoto;
                showPhotoPreview(savedPhoto);
            }

            // Live listener: updates automatically on every device whenever
            // anyone (you or your friend) changes the photo — no reload needed.
            firebase.database().ref("zainaPhoto/dataUrl").on("value", function (snapshot) {
                const cloudPhoto = snapshot.val();
                if (cloudPhoto && cloudPhoto !== lastSyncedPhoto) {
                    lastSyncedPhoto = cloudPhoto;
                    showPhotoPreview(cloudPhoto);
                    try {
                        localStorage.setItem("zainaPhoto", cloudPhoto);
                    } catch (err) {
                        console.error("Local photo cache failed:", err);
                    }
                } else if (!cloudPhoto && lastSyncedPhoto) {
                    // Someone removed the photo on another device
                    resetPhotoUI();
                    localStorage.removeItem("zainaPhoto");
                }
            }, function (err) {
                console.error("Firebase photo listener failed:", err);
            });
        }

        // Smooth flip-clock style update: only animates when the value actually changes
        function flipSetText(elId, newText) {
            const el = document.getElementById(elId);
            if (el.dataset.val === newText) return;
            el.dataset.val = newText;
            el.classList.remove("digit-flip");
            void el.offsetWidth; // restart animation
            el.classList.add("digit-flip");
            setTimeout(function () {
                el.innerText = newText;
            }, 155); // swap right at the flip's edge-on midpoint
            setTimeout(function () {
                el.classList.remove("digit-flip");
            }, 330);
        }

        // Enhanced Text-to-Speech - Kodular Optimized
        function speakAge() {
            const yearsVal = parseInt(document.getElementById("years").innerText || 0);
            const monthsVal = parseInt(document.getElementById("months").innerText || 0);
            const daysVal = parseInt(document.getElementById("days").innerText || 0);

            let message = "";
            let lang = "en";

            if (currentLang === 'hi') {
                const parts = [];
                if (yearsVal > 0) parts.push(`${yearsVal} साल`);
                if (monthsVal > 0) parts.push(`${monthsVal} महीने`);
                if (daysVal > 0) parts.push(`${daysVal} दिन`);
                const ageStr = parts.join(", ");
                message = `ज़ैना पार्वीन ${ageStr} की हैं।`;
                lang = "hi";
            } else {
                const parts = [];
                if (yearsVal > 0) parts.push(`${yearsVal} year${yearsVal > 1 ? 's' : ''}`);
                if (monthsVal > 0) parts.push(`${monthsVal} month${monthsVal > 1 ? 's' : ''}`);
                if (daysVal > 0) parts.push(`${daysVal} day${daysVal > 1 ? 's' : ''}`);
                const ageStr = parts.join(", ");
                message = `Zaina Parveen is ${ageStr} old.`;
                lang = "en";
            }

            console.log("Speaking: " + message);
            playSound(message, lang);
        }

        // Method 1: Cloud-based TTS using ttsmp3.com (WORKS IN KODULAR)
        function playSound(text, lang) {
            try {
                console.log("Using Cloud TTS");
                const encodedText = encodeURIComponent(text);
                const ttsUrl = `https://ttsmp3.com/api/convert?text=${encodedText}&lang=${lang}&rate=0.8&voice=Google&format=json`;

                fetch(ttsUrl)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success' && data.result && data.result.url) {
                            const audioUrl = data.result.url;
                            const audio = new Audio(audioUrl);
                            audio.volume = 1;
                            
                            audio.onplay = function() {
                                console.log("Audio playing");
                            };
                            
                            audio.onended = function() {
                                console.log("Audio finished");
                            };
                            
                            audio.onerror = function() {
                                console.error("Audio play error");
                            };
                            
                            audio.play().catch(function(error) {
                                console.error("Play failed:", error);
                            });
                        } else {
                            console.error("TTS generation failed");
                        }
                    })
                    .catch(error => {
                        console.error("Network error:", error);
                    });

            } catch (error) {
                console.error("Cloud TTS error:", error);
            }
        }

        // Method 2: Fallback (not used anymore)
        function tryGoogleTTS(text, lang) {
            // Using cloud TTS instead
            playSound(text, lang);
        }

        function updateAgeCounter() {
            const now = new Date();
            
            if (now < birthDate) {
                document.getElementById("years").innerText = "0";
                document.getElementById("months").innerText = "0";
                document.getElementById("days").innerText = "0";
                document.getElementById("totalDaysCount").innerText = "0";
                return;
            }

            // 1. Calculate Total Days Directly
            const totalTimeDifference = now - birthDate;
            const totalDaysCalculated = Math.floor(totalTimeDifference / (1000 * 60 * 60 * 24));
            document.getElementById("totalDaysCount").innerText = totalDaysCalculated;

            // 2. Precise Calendar YY MM DD Breakdown Calculation
            let currentYear = now.getFullYear();
            let currentMonth = now.getMonth();
            let currentDay = now.getDate();

            let birthYear = birthDate.getFullYear();
            let birthMonth = birthDate.getMonth();
            let birthDay = birthDate.getDate();

            let calculatedYears = currentYear - birthYear;
            let calculatedMonths = currentMonth - birthMonth;
            let calculatedDays = currentDay - birthDay;

            if (calculatedDays < 0) {
                const previousMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                calculatedDays += previousMonth;
                calculatedMonths--;
            }

            if (calculatedMonths < 0) {
                calculatedMonths += 12;
                calculatedYears--;
            }

            document.getElementById("years").innerText = calculatedYears;
            document.getElementById("months").innerText = calculatedMonths;
            document.getElementById("days").innerText = calculatedDays;

            // 3. 12-Hour format details injection to individual spans
            let rawHours = now.getHours();
            const ampm = rawHours >= 12 ? 'PM' : 'AM';
            
            let displayHours = rawHours % 12;
            displayHours = displayHours ? displayHours : 12; // Convert '0' to '12'

            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            
            // Updating each UI element block independently to maintain position layout
            document.getElementById("lblHour").innerText = String(displayHours);
            document.getElementById("lblMin").innerText = minutes;
            document.getElementById("lblSec").innerText = seconds;
            document.getElementById("lblMs").innerText = ms;
            document.getElementById("lblAmpm").innerText = ampm;
        }

        // Initialize App
        updateStaticText();
        updateAgeCounter();
        loadSavedPhoto();
        setInterval(updateAgeCounter, 40);
    </script>
